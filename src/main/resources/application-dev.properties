# ===================================================================
# SmartCrop - Development Profile Configuration
# ===================================================================
# Activate with: --spring.profiles.active=dev
# Features: SQL logging enabled, debug mode
# ===================================================================

# Application
spring.application.name=SmartCrop
server.port=8080

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/crop_recommendation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP - Development)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate - Development (show SQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Thymeleaf (cache disabled for hot reload)
spring.thymeleaf.cache=false

# OpenWeather API Configuration
openweather.api.key=YOUR_OPENWEATHER_API_KEY
openweather.api.base-url=https://api.openweathermap.org/data/2.5/weather
openweather.api.timeout-seconds=10

# JWT Configuration (shorter expiration for dev)
jwt.secret=SmartCropRecommendationSystemJWTSecretKeyForDevelopmentOnly
jwt.expiration-ms=3600000
jwt.issuer=SmartCrop-dev

# Logging - Development (verbose)
logging.level.root=INFO
logging.level.com.crop=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS (allow all for dev)
cors.allowed-origins=*
